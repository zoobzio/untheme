name: Setup
description: Check out toolchain — pnpm, Node, and a frozen workspace install.

inputs:
  node-version:
    description: >-
      Node version to install. Leave empty to read .nvmrc (the pinned dev
      version); the test matrix overrides it per entry.
    required: false
    default: ""

runs:
  using: composite
  steps:
    # Reads the pnpm version from the root package.json "packageManager" field.
    - name: Set up pnpm
      uses: pnpm/action-setup@v4

    # When node-version is empty, setup-node falls back to node-version-file.
    - name: Set up Node
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        node-version-file: .nvmrc
        cache: pnpm

    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile --ignore-scripts
